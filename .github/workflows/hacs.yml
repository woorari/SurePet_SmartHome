name: Validate with HACS

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 0 * * *"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hacs/action@main
        with:
          category: integration
          # "brands" requires the integration to be listed in the
          # home-assistant/brands repo; ignore until that submission is merged.
          ignore: brands
