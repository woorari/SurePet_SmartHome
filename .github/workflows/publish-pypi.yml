name: Publish to PyPI

# Publishes the pysurehub client library to PyPI. The integration's manifest
# pins `pysurehub==<version>`, so the library must be on PyPI for Home
# Assistant to install it. Cutting a GitHub release publishes both the HACS
# zip (release.yml) and the library (this workflow).
#
# Uses PyPI Trusted Publishing (OIDC) — no API token is stored. A one-time
# trusted publisher must be configured on PyPI first:
#   https://pypi.org/manage/account/publishing/
#     PyPI Project Name: pysurehub
#     Owner:             woorari
#     Repository name:   SurePet_SmartHome
#     Workflow name:     publish-pypi.yml
#     Environment name:  pypi
#
# Hardening note: GitHub recommends pinning third-party actions to a commit
# SHA. `pypa/gh-action-pypi-publish@release/v1` is the maintainer's supported
# moving ref; swap it for a SHA if you want fully reproducible runs.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Sync library version to release tag
        if: github.event_name == 'release'
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          # Validate before using in a command — never trust event input raw.
          if ! printf '%s' "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.]+)?$'; then
            echo "::error::Unexpected release tag '${TAG_NAME}' -> version '${VERSION}'"
            exit 1
          fi
          sed -i -E "s/^version = \".*\"/version = \"${VERSION}\"/" pyproject.toml
          grep -E '^version = ' pyproject.toml

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: release-dists
          path: dist/

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build]
    environment:
      name: pypi
      url: https://pypi.org/p/pysurehub
    permissions:
      id-token: write # mandatory for trusted publishing
    steps:
      - name: Retrieve distributions
        uses: actions/download-artifact@v5
        with:
          name: release-dists
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
