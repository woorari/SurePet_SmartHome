name: Publish to PyPI

# Publishes the pysurehub client library to PyPI — deliberately DECOUPLED from
# integration (HACS) releases. The library changes far less often than the
# integration, so it's published on demand via manual dispatch rather than on
# every GitHub release. The integration's manifest pins `pysurehub==<version>`;
# bump that pin by hand when you adopt a newer library.
#
# Uses PyPI Trusted Publishing (OIDC) — no API token is stored. One-time setup:
#   https://pypi.org/manage/account/publishing/
#     PyPI Project Name: pysurehub
#     Owner:             woorari
#     Repository name:   SurePet_SmartHome
#     Workflow name:     publish-pypi.yml
#     Environment name:  pypi
#
# Hardening note: GitHub recommends pinning third-party actions to a commit
# SHA. `pypa/gh-action-pypi-publish@release/v1` is the maintainer's supported
# moving ref; swap it for a SHA if you want fully reproducible runs.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Library version to publish (e.g. 0.1.1). Blank = use pyproject.toml as-is."
        required: false
        type: string

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set library version (optional override)
        if: ${{ inputs.version != '' }}
        env:
          VERSION: ${{ inputs.version }}
        run: |
          # Validate before using in a command — never trust input raw.
          if ! printf '%s' "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.]+)?$'; then
            echo "::error::Invalid version '${VERSION}'"
            exit 1
          fi
          sed -i -E "s/^version = \".*\"/version = \"${VERSION}\"/" pyproject.toml
          grep -E '^version = ' pyproject.toml

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: release-dists
          path: dist/

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build]
    environment:
      name: pypi
      url: https://pypi.org/p/pysurehub
    permissions:
      id-token: write # mandatory for trusted publishing
    steps:
      - name: Retrieve distributions
        uses: actions/download-artifact@v5
        with:
          name: release-dists
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
