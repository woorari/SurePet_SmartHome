name: Publish Wiki

on:
  push:
    branches: [main]
    paths:
      - "wiki/**"
      - ".github/workflows/wiki.yml"

permissions:
  contents: write

# Mirrors the wiki/ folder to the repository's GitHub wiki.
# Note: the wiki must be initialized once (create any page in the GitHub UI)
# before the first run can push to it.
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: Andrew-Chen-Wang/github-wiki-action@v4
        with:
          path: wiki/
